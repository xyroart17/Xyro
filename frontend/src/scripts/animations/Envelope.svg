<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 46">
    <!-- Premium Envelope Base -->
    <rect class="env-bg" width="64" height="46" rx="4" ry="4" fill="#ffffff" stroke="rgba(0,0,0,0.12)" stroke-width="1" />
    <!-- Top Flap (Initially open/pointing slightly down) -->
    <polygon class="env-flap" points="0,0 64,0 32,20" fill="#fcfcfc" stroke="#d4d4d4" stroke-width="1" />
    <!-- Side and Bottom Folds -->
    <path class="env-body" d="M 0,46 L 32,24 L 64,46" fill="none" stroke="#d4d4d4" stroke-width="1" />
</svg>
